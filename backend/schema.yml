openapi: 3.0.3
info:
  title: ApexPlan API
  version: 1.0.0
  description: Backend API for ApexPlan
paths:
  /api/auth/login/:
    post:
      operationId: auth_login_create
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Login'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/Login'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/Login'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Login'
          description: ''
  /api/auth/me/:
    get:
      operationId: auth_me_retrieve
      tags:
      - auth
      security:
      - jwtAuth: []
      responses:
        '200':
          description: No response body
  /api/auth/register/:
    post:
      operationId: auth_register_create
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Register'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/Register'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/Register'
        required: true
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Register'
          description: ''
  /api/calendar/:
    get:
      operationId: calendar_list
      tags:
      - calendar
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/CalendarEvent'
          description: ''
    post:
      operationId: calendar_create
      tags:
      - calendar
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CalendarEvent'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/CalendarEvent'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/CalendarEvent'
        required: true
      security:
      - jwtAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CalendarEvent'
          description: ''
  /api/calendar/{id}/:
    get:
      operationId: calendar_retrieve
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - calendar
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CalendarEvent'
          description: ''
    put:
      operationId: calendar_update
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - calendar
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CalendarEvent'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/CalendarEvent'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/CalendarEvent'
        required: true
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CalendarEvent'
          description: ''
    patch:
      operationId: calendar_partial_update
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - calendar
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedCalendarEvent'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedCalendarEvent'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedCalendarEvent'
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CalendarEvent'
          description: ''
    delete:
      operationId: calendar_destroy
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - calendar
      security:
      - jwtAuth: []
      responses:
        '204':
          description: No response body
  /api/goals/:
    get:
      operationId: goals_list
      tags:
      - goals
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Goal'
          description: ''
    post:
      operationId: goals_create
      tags:
      - goals
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Goal'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/Goal'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/Goal'
        required: true
      security:
      - jwtAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Goal'
          description: ''
  /api/goals/{id}/:
    get:
      operationId: goals_retrieve
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - goals
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Goal'
          description: ''
    put:
      operationId: goals_update
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - goals
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Goal'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/Goal'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/Goal'
        required: true
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Goal'
          description: ''
    patch:
      operationId: goals_partial_update
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - goals
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedGoal'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedGoal'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedGoal'
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Goal'
          description: ''
    delete:
      operationId: goals_destroy
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - goals
      security:
      - jwtAuth: []
      responses:
        '204':
          description: No response body
  /api/health/:
    get:
      operationId: health_retrieve
      description: Checks whether the API is running.
      summary: Health Check
      tags:
      - System
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          description: No response body
  /api/objectives/:
    get:
      operationId: objectives_list
      tags:
      - objectives
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Objective'
          description: ''
    post:
      operationId: objectives_create
      tags:
      - objectives
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Objective'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/Objective'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/Objective'
        required: true
      security:
      - jwtAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Objective'
          description: ''
  /api/objectives/{id}/:
    get:
      operationId: objectives_retrieve
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - objectives
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Objective'
          description: ''
    put:
      operationId: objectives_update
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - objectives
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Objective'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/Objective'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/Objective'
        required: true
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Objective'
          description: ''
    patch:
      operationId: objectives_partial_update
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - objectives
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedObjective'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedObjective'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedObjective'
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Objective'
          description: ''
    delete:
      operationId: objectives_destroy
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - objectives
      security:
      - jwtAuth: []
      responses:
        '204':
          description: No response body
  /api/schema:
    get:
      operationId: schema_retrieve
      description: |-
        OpenApi3 schema for this API. Format can be selected via content negotiation.

        - YAML: application/vnd.oai.openapi
        - JSON: application/vnd.oai.openapi+json
      parameters:
      - in: query
        name: format
        schema:
          type: string
          enum:
          - json
          - yaml
      - in: query
        name: lang
        schema:
          type: string
          enum:
          - af
          - ar
          - ar-dz
          - ast
          - az
          - be
          - bg
          - bn
          - br
          - bs
          - ca
          - ckb
          - cs
          - cy
          - da
          - de
          - dsb
          - el
          - en
          - en-au
          - en-gb
          - eo
          - es
          - es-ar
          - es-co
          - es-mx
          - es-ni
          - es-ve
          - et
          - eu
          - fa
          - fi
          - fr
          - fy
          - ga
          - gd
          - gl
          - he
          - hi
          - hr
          - hsb
          - ht
          - hu
          - hy
          - ia
          - id
          - ig
          - io
          - is
          - it
          - ja
          - ka
          - kab
          - kk
          - km
          - kn
          - ko
          - ky
          - lb
          - lt
          - lv
          - mk
          - ml
          - mn
          - mr
          - ms
          - my
          - nb
          - ne
          - nl
          - nn
          - os
          - pa
          - pl
          - pt
          - pt-br
          - ro
          - ru
          - sk
          - sl
          - sq
          - sr
          - sr-latn
          - sv
          - sw
          - ta
          - te
          - tg
          - th
          - tk
          - tr
          - tt
          - udm
          - ug
          - uk
          - ur
          - uz
          - vi
          - zh-hans
          - zh-hant
      tags:
      - schema
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/vnd.oai.openapi:
              schema:
                type: object
                additionalProperties: {}
            application/yaml:
              schema:
                type: object
                additionalProperties: {}
            application/vnd.oai.openapi+json:
              schema:
                type: object
                additionalProperties: {}
            application/json:
              schema:
                type: object
                additionalProperties: {}
          description: ''
components:
  schemas:
    CalendarEvent:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        goal:
          type: integer
          nullable: true
        title:
          type: string
          maxLength: 255
        start:
          type: string
          format: date-time
        end:
          type: string
          format: date-time
        color:
          type: string
          maxLength: 7
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - created_at
      - end
      - id
      - start
      - title
      - updated_at
    Goal:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        objective:
          type: integer
        title:
          type: string
          maxLength: 255
        description:
          type: string
        status:
          $ref: '#/components/schemas/GoalStatusEnum'
        order_index:
          type: integer
          readOnly: true
        estimated_days:
          type: integer
          maximum: 2147483647
          minimum: 0
        extra_days:
          type: integer
          maximum: 2147483647
          minimum: 0
        start_date:
          type: string
          format: date
          readOnly: true
          nullable: true
        end_date:
          type: string
          format: date
          readOnly: true
          nullable: true
        is_completed:
          type: boolean
          readOnly: true
      required:
      - end_date
      - estimated_days
      - id
      - is_completed
      - objective
      - order_index
      - start_date
      - title
    GoalStatusEnum:
      enum:
      - PENDING
      - IN_PROGRESS
      - COMPLETED
      type: string
      description: |-
        * `PENDING` - Pending
        * `IN_PROGRESS` - In Progress
        * `COMPLETED` - Completed
    Login:
      type: object
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          writeOnly: true
      required:
      - email
      - password
    Objective:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        title:
          type: string
          maxLength: 255
        description:
          type: string
        start_date:
          type: string
          format: date
        end_date:
          type: string
          format: date
          readOnly: true
          nullable: true
        status:
          allOf:
          - $ref: '#/components/schemas/ObjectiveStatusEnum'
          readOnly: true
      required:
      - end_date
      - id
      - start_date
      - status
      - title
    ObjectiveStatusEnum:
      enum:
      - ACTIVE
      - COMPLETED
      - CANCELED
      type: string
      description: |-
        * `ACTIVE` - Ativo
        * `COMPLETED` - Concluído
        * `CANCELED` - Cancelado
    PatchedCalendarEvent:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        goal:
          type: integer
          nullable: true
        title:
          type: string
          maxLength: 255
        start:
          type: string
          format: date-time
        end:
          type: string
          format: date-time
        color:
          type: string
          maxLength: 7
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
    PatchedGoal:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        objective:
          type: integer
        title:
          type: string
          maxLength: 255
        description:
          type: string
        status:
          $ref: '#/components/schemas/GoalStatusEnum'
        order_index:
          type: integer
          readOnly: true
        estimated_days:
          type: integer
          maximum: 2147483647
          minimum: 0
        extra_days:
          type: integer
          maximum: 2147483647
          minimum: 0
        start_date:
          type: string
          format: date
          readOnly: true
          nullable: true
        end_date:
          type: string
          format: date
          readOnly: true
          nullable: true
        is_completed:
          type: boolean
          readOnly: true
    PatchedObjective:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        title:
          type: string
          maxLength: 255
        description:
          type: string
        start_date:
          type: string
          format: date
        end_date:
          type: string
          format: date
          readOnly: true
          nullable: true
        status:
          allOf:
          - $ref: '#/components/schemas/ObjectiveStatusEnum'
          readOnly: true
    Register:
      type: object
      properties:
        username:
          type: string
          description: Required. 150 characters or fewer. Letters, digits and @/./+/-/_
            only.
          pattern: ^[\w.@+-]+$
          maxLength: 150
        email:
          type: string
          format: email
        password:
          type: string
          writeOnly: true
          maxLength: 128
        confirm_password:
          type: string
          writeOnly: true
      required:
      - confirm_password
      - email
      - password
      - username
  securitySchemes:
    jwtAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
